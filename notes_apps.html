<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxed Notes App</title>
    <link rel="stylesheet" href="notes_apps_style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Relaxed Notes</h1>
            <p class="subtitle">A simple note-taking application with local storage</p>
            <a href="index.html#projects" class="back-link">← Back to Projects</a>
        </header>

        <div class="notes-app">
            <div class="note-input">
                <input type="text" placeholder="Note title" class="note-title" id="noteTitle">
                <textarea placeholder="Note content..." class="note-content" id="noteContent"></textarea>
                <button class="add-note" id="addNoteBtn">➕ Add Note</button>
            </div>

            <div class="notes-list" id="notesList">
                <!-- Notes akan tampil di sini via JavaScript -->
            </div>
        </div>

        <footer>
            <p>© 2026 - Notes App (with Local Storage)</p>
        </footer>
    </div>

    <script>
        // ===== NOTES APP WITH LOCAL STORAGE =====
        const STORAGE_KEY = 'relaxedNotes';

        // Load notes dari localStorage saat halaman dimuat
        let notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // Fungsi untuk menyimpan notes ke localStorage
        function saveNotes() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        // Fungsi untuk menampilkan notes
        function renderNotes() {
            const notesList = document.getElementById('notesList');
            notesList.innerHTML = '';

            if (notes.length === 0) {
                notesList.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">No notes yet. Add your first note! 📝</p>';
                return;
            }

            notes.forEach((note, index) => {
                const noteCard = document.createElement('div');
                noteCard.className = 'note-card';
                noteCard.innerHTML = `
                    <h3>${escapeHtml(note.title) || 'Untitled'}</h3>
                    <p>${escapeHtml(note.content) || '...'}</p>
                    <small>${note.date || new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</small>
                    <button class="delete-btn" data-index="${index}">🗑️ Delete</button>
                `;
                notesList.appendChild(noteCard);
            });

            // Tambahkan event listener ke semua tombol delete
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = this.getAttribute('data-index');
                    deleteNote(index);
                });
            });
        }

        // Fungsi untuk menghindari XSS (escaping HTML)
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Fungsi untuk menambah note baru
        function addNote() {
            const titleInput = document.getElementById('noteTitle');
            const contentInput = document.getElementById('noteContent');
            
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title || !content) {
                alert('Please fill in both title and content!');
                return;
            }

            const newNote = {
                title: title,
                content: content,
                date: new Date().toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                })
            };

            notes.push(newNote);
            saveNotes();
            renderNotes();

            // Kosongkan input
            titleInput.value = '';
            contentInput.value = '';
        }

        // Fungsi untuk menghapus note
        function deleteNote(index) {
            if (confirm('Delete this note?')) {
                notes.splice(index, 1);
                saveNotes();
                renderNotes();
            }
        }

        // Inisialisasi saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            renderNotes();
            document.getElementById('addNoteBtn').addEventListener('click', addNote);
        });
    </script>
</body>
</html>
