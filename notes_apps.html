<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxed Notes App</title>
    <link rel="stylesheet" href="notes_apps_style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Relaxed Notes</h1>
            <p class="subtitle">A simple note-taking application</p>
            <a href="index.html#projects" class="back-link">← Back to Projects</a>
        </header>

        <div class="notes-app">
            <!-- FORM INPUT -->
            <div class="note-input">
                <input type="text" id="noteTitle" placeholder="Note title" class="note-title">
                <textarea id="noteContent" placeholder="Note content..." class="note-content"></textarea>
                <button class="add-note" onclick="addNote()">➕ Add Note</button>
            </div>

            <!-- DAFTAR CATATAN -->
            <div class="notes-list" id="notesList">
                <!-- nanti diisi lewat javascript -->
            </div>
        </div>

        <footer>
            <p>© 2026 - Notes App (Simple Version)</p>
        </footer>
    </div>

    <script>
        // Array kosong buat nyimpan catatan
        let notes = [];

        // Fungsi buat nampilin catatan
        function displayNotes() {
            const list = document.getElementById('notesList');
            list.innerHTML = ''; // kosongin dulu

            for (let i = 0; i < notes.length; i++) {
                const note = notes[i];
                list.innerHTML += `
                    <div class="note-card">
                        <h3>${note.title}</h3>
                        <p>${note.content}</p>
                        <small>${note.date}</small>
                        <button class="delete-btn" onclick="deleteNote(${i})">🗑️ Hapus</button>
                    </div>
                `;
            }
        }

        // Fungsi buat nambah catatan
        function addNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;

            if (title === '' || content === '') {
                alert('Judul dan isi catatan harus diisi!');
                return;
            }

            // Buat object catatan baru
            const newNote = {
                title: title,
                content: content,
                date: new Date().toLocaleDateString('id-ID', { 
                    day: 'numeric', 
                    month: 'long', 
                    year: 'numeric' 
                })
            };

            // Tambah ke array
            notes.push(newNote);

            // Kosongin input
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';

            // Tampilkan ulang
            displayNotes();
        }

        // Fungsi buat hapus catatan
        function deleteNote(index) {
            notes.splice(index, 1); // hapus dari array
            displayNotes(); // tampilkan ulang
        }

        // Pas pertama kali buka, langsung tampilkan (masih kosong)
        displayNotes();
    </script>
</body>
</html>
