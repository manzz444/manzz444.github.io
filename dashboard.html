<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin</title>
    <link rel="stylesheet" href="dashboard_style.css">
</head>
<body>
    <!-- PASSWORD PROMPT -->
    <div id="passwordPrompt" class="password-prompt">
        <h2>🔒 Admin Only</h2>
        <label for="passwordInput" class="hidden-label">Password</label>
        <input type="password" id="passwordInput" class="password-input" placeholder="Enter password">
        <button onclick="checkPassword()" class="password-btn">Submit</button>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div id="mainContent" class="dashboard hidden">
        <div class="header">[ HACKER DASHBOARD ]</div>
        <div class="stats-grid">
            <div class="stat">👥 Visitors: 1,337</div>
            <div class="stat">📁 Projects: 3</div>
            <div class="stat">📝 Blogs: 4</div>
            <div class="stat">⭐ Stars: 47</div>
        </div>
        <div class="progress">
            <div>HTML: <progress value="90" max="100"></progress> 90%</div>
            <div>CSS: <progress value="85" max="100"></progress> 85%</div>
            <div>JS: <progress value="60" max="100"></progress> 60%</div>
        </div>
        <div class="log">[LOG] 2026-03-12 — Tribute page updated</div>
        <div class="log">[LOG] 2026-03-12 — Games theme deployed</div>
        <div class="log">[LOG] 2026-03-11 — Hacker terminal online</div>
        <div class="menu">
            <a href="hacker.html">◀ HACKER</a>
            <a href="games_retro.html">GAMES ◀</a>
            <a href="tribute.html">TRIBUTE ▶</a>
            <a href="../index.html">🏠 HOME</a>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = '786343';

        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const promptDiv = document.getElementById('passwordPrompt');
            const contentDiv = document.getElementById('mainContent');

            if (input.value === ADMIN_PASSWORD) {
                promptDiv.classList.add('hidden');
                contentDiv.classList.remove('hidden');
                sessionStorage.setItem('dashboardAuth', 'true');
            } else {
                alert('Access denied');
                window.location.href = '../index.html';
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('dashboardAuth') === 'true') {
                document.getElementById('passwordPrompt').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
