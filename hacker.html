<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Terminal | Command Center</title>
    <link rel="stylesheet" href="hacker_style.css">
</head>
<body>
    <!-- PASSWORD PROMPT -->
    <div id="passwordPrompt" class="password-prompt">
        <h2>🔒 HACKER TERMINAL v21.2.2018</h2>
        <p>Enter password to access command center:</p>
        <input type="password" id="passwordInput" class="password-input" placeholder="********">
        <button onclick="checkPassword()" class="password-btn">AUTHENTICATE</button>
    </div>

    <!-- TERMINAL CONTENT -->
    <div id="mainContent" class="terminal hidden">
        <div class="terminal-header">
            <span class="terminal-title">HACKER TERMINAL v21.2.2018</span>
            <span class="terminal-status">[USER: <span id="userIndicator">guest</span>]</span>
        </div>
        
        <!-- OUTPUT TERMINAL -->
        <div class="terminal-output" id="terminalOutput">
            <div>> System initialized...</div>
            <div>> Type /help for commands</div>
        </div>

        <!-- INPUT LINE -->
        <div class="terminal-input-line">
            <span class="prompt">$</span>
            <input type="text" id="terminalInput" class="terminal-input" autofocus placeholder="Type command here...">
        </div>

        <div class="terminal-footer">
            <span>[CONNECTION: SECURE]</span>
            <span>[PORT: 22]</span>
        </div>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const password = input.value;
            
            if (password === '786343') {
                sessionStorage.setItem('hackerAuth', 'true');
                document.getElementById('passwordPrompt').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('userIndicator').innerText = 'admin';
                
                // Trigger terminal siap
                if (window.initializeTerminal) {
                    window.initializeTerminal();
                }
            } else {
                alert('❌ Access denied. Wrong password.');
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('hackerAuth') === 'true') {
                document.getElementById('passwordPrompt').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('userIndicator').innerText = 'admin';
            }
        };
    </script>

    <script src="hacker_terminal.js"></script>
</body>
</html>
